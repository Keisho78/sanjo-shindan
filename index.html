<!DOCTYPE html>
<!--
  ============================================================================
  三条工務店 ビジネス版MBTI適性診断（単一ファイル版）
  ============================================================================
  ■ 目的
    採用選考の場で応募者に受けてもらう参考ツール。合否判定には使わない。
    回答はブラウザのメモリ上のみで処理し、外部送信・保存は一切行わない。

  ■ 編集ガイド（カスタマイズしたい場合はここを編集）
    1. スコア合成比率・下限:
         ANSWER_RATIO  … 回答スコアの比率（残りがタイプ補正）。既定 0.75
         SCORE_FLOOR   … スコア下限の底上げ値。既定 40（40〜100%に圧縮）
    2. 質問の編集（全76問 = 共通60問 + タイプ別16問）:
         COMMON_QUESTIONS  … 全タイプ共通の基礎質問60問（10カテゴリ×6問）
         LETTER_QUESTIONS  … E/I/S/N/T/F/J/P 各文字ごとの出し分け質問（各4問）
         各質問は { text, cat, rev } 形式。
           cat: "stress"(ストレス耐性) / "nego"(対人折衝) / "acc"(正確性) /
                "team"(チームワーク・誠実性) / "adapt"(変化対応・段取り) /
                "drive"(目標達成意欲) / "create"(創造性・デザイン感覚) /
                "empathy"(傾聴・共感力) / "plan"(企画・分析・発信) /
                "learn"(学習意欲・成長志向)
           rev: true にすると逆転項目（回答値を 6-値 で反転）
    3. 部署別のカテゴリ重み: DEPT_WEIGHTS
    4. カルチャーフィットのカテゴリ重み: CULTURE_WEIGHTS
    5. タイプごとの部署補正(0-100): TYPE_BONUS
    6. タイプ解説文: TYPE_PROFILES
    7. カテゴリ別の詳細コメント(強み/安定/伸びしろの3段階): CATEGORY_COMMENTS
    8. 回答スタイル分析の判定しきい値・文言: ANSWER_STYLE_METRICS

  ■ 動作確認手順
    ・このファイルをブラウザ（Chrome/Safari/Edge）でダブルクリックで開くだけ。
    ・GitHub Pages: リポジトリにこのファイルを index.html として置き、
      Settings > Pages で公開ブランチを指定すれば URL で配布できる。
  ============================================================================
-->
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>三条工務店 ビジネス適性診断</title>

<!-- CDN: React 18 / Babel(ブラウザ内JSX変換) / Chart.js -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  /* ===== デザイントークン: ネイビー基調＋銅色アクセント ===== */
  :root {
    --navy: #16324f;
    --navy-dark: #0e2438;
    --navy-light: #2c5578;
    --accent: #c07b3a;      /* 銅色アクセント */
    --accent-soft: #f4e6d6;
    --bg: #f5f7f9;
    --card: #ffffff;
    --text: #24313d;
    --text-sub: #5a6b7a;
    --line: #dde4ea;
    --green: #2e7d5b;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN",
                 "Noto Sans JP", "Yu Gothic UI", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    font-size: 16px;
  }
  #root { min-height: 100vh; display: flex; flex-direction: column; }

  /* ===== 共通レイアウト ===== */
  .app-header {
    background: var(--navy);
    color: #fff;
    padding: 14px 20px;
    text-align: center;
  }
  .app-header .brand { font-size: 13px; letter-spacing: 0.12em; opacity: 0.85; }
  .app-header .title { font-size: 17px; font-weight: 700; }
  .container {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 56px;
    flex: 1;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: 0 2px 12px rgba(22, 50, 79, 0.08);
    padding: 28px 24px;
    margin-bottom: 20px;
  }
  @media (max-width: 480px) { .card { padding: 22px 16px; } }

  /* 画面切替アニメーション */
  .screen { animation: fadeUp 0.35s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
  }

  h1 { font-size: 24px; color: var(--navy); line-height: 1.4; margin-bottom: 12px; }
  h2 { font-size: 19px; color: var(--navy); margin-bottom: 10px; }
  h3 { font-size: 16px; color: var(--navy); margin-bottom: 6px; }
  p.sub { color: var(--text-sub); font-size: 14.5px; }

  /* ===== ボタン ===== */
  .btn {
    display: inline-block;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 28px;
    min-height: 50px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 3px 10px rgba(192,123,58,0.35); }
  .btn-primary:hover { box-shadow: 0 5px 16px rgba(192,123,58,0.45); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
  .btn-ghost { background: transparent; color: var(--navy-light); border: 1.5px solid var(--line); }
  .btn-ghost:hover { border-color: var(--navy-light); }
  .btn-wide { width: 100%; }

  /* ===== トップ画面 ===== */
  .hero-badge {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 999px;
    margin-bottom: 14px;
  }
  .info-list { list-style: none; margin: 18px 0; }
  .info-list li {
    padding: 10px 0 10px 30px;
    position: relative;
    border-bottom: 1px dashed var(--line);
    font-size: 15px;
  }
  .info-list li::before {
    content: "✓";
    position: absolute; left: 4px;
    color: var(--green); font-weight: 700;
  }
  .notice-box {
    background: #fdf7ef;
    border: 1px solid #ecd9bf;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13.5px;
    color: #6b5638;
    margin: 16px 0 22px;
  }

  /* ===== タイプ選択画面 ===== */
  .mode-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .mode-tab {
    flex: 1;
    font-family: inherit;
    font-size: 14px; font-weight: 700;
    padding: 12px 6px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: #fff; color: var(--text-sub);
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-tab.active { background: var(--navy); border-color: var(--navy); color: #fff; }

  .axis-block { margin-bottom: 18px; }
  .axis-label { font-size: 13px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; }
  .axis-pair { display: flex; gap: 10px; }
  .axis-option {
    flex: 1;
    font-family: inherit;
    text-align: left;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: #fff;
    cursor: pointer;
    transition: all 0.15s;
  }
  .axis-option:hover { border-color: var(--navy-light); }
  .axis-option.selected { border-color: var(--accent); background: var(--accent-soft); }
  .axis-option .letter { font-size: 18px; font-weight: 800; color: var(--navy); }
  .axis-option .desc { font-size: 12.5px; color: var(--text-sub); line-height: 1.5; }

  .type-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  @media (max-width: 560px) { .type-grid { grid-template-columns: repeat(2, 1fr); } }
  .type-cell {
    font-family: inherit;
    padding: 12px 8px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: #fff;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    min-height: 74px;
  }
  .type-cell:hover { border-color: var(--navy-light); transform: translateY(-2px); }
  .type-cell.selected { border-color: var(--accent); background: var(--accent-soft); }
  .type-cell .code { font-size: 17px; font-weight: 800; color: var(--navy); letter-spacing: 0.05em; }
  .type-cell .name { font-size: 11.5px; color: var(--text-sub); line-height: 1.45; display: block; margin-top: 2px; }

  .selected-type-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--navy); color: #fff;
    border-radius: 10px;
    padding: 14px 18px;
    margin-top: 20px;
  }
  .selected-type-bar .code { font-size: 22px; font-weight: 800; letter-spacing: 0.08em; }
  .selected-type-bar .name { font-size: 13px; opacity: 0.85; }

  /* ===== 質問画面 ===== */
  .progress-wrap { margin-bottom: 22px; }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 13px; color: var(--text-sub); font-weight: 700;
    margin-bottom: 6px;
  }
  .progress-track {
    height: 8px; background: var(--line);
    border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--navy-light), var(--accent));
    border-radius: 999px;
    transition: width 0.3s ease;
  }
  .q-category {
    display: inline-block;
    font-size: 12px; font-weight: 700;
    color: var(--navy-light);
    background: #e8eef4;
    padding: 3px 12px;
    border-radius: 999px;
    margin-bottom: 12px;
  }
  .q-text { font-size: 18px; font-weight: 700; line-height: 1.7; margin-bottom: 24px; min-height: 3.4em; }
  @media (max-width: 480px) { .q-text { font-size: 16.5px; } }

  .likert { display: flex; flex-direction: column; gap: 10px; }
  .likert-option {
    font-family: inherit;
    display: flex; align-items: center; gap: 14px;
    width: 100%;
    padding: 13px 16px;
    min-height: 52px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: #fff;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }
  .likert-option:hover { border-color: var(--navy-light); background: #f7fafc; }
  .likert-option.selected { border-color: var(--accent); background: var(--accent-soft); font-weight: 700; }
  .likert-option .num {
    flex-shrink: 0;
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--line); color: var(--text-sub);
    font-weight: 800; font-size: 14px;
  }
  .likert-option.selected .num { background: var(--accent); color: #fff; }

  .quiz-nav { display: flex; gap: 12px; margin-top: 24px; }
  .quiz-nav .btn { flex: 1; }
  .unanswered-note {
    margin-top: 16px;
    background: #fdf7ef;
    border: 1px solid #ecd9bf;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13.5px;
    color: #6b5638;
    line-height: 1.7;
  }

  /* ===== 結果画面 ===== */
  .fit-gauge-wrap { text-align: center; padding: 8px 0 4px; }
  .fit-score { font-size: 52px; font-weight: 800; color: var(--navy); line-height: 1.1; }
  .fit-score small { font-size: 22px; color: var(--text-sub); font-weight: 700; }
  .gauge-track {
    height: 16px; background: var(--line);
    border-radius: 999px; overflow: hidden;
    margin: 14px 0 10px;
  }
  .gauge-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--navy-light), var(--accent));
    border-radius: 999px;
    transition: width 0.8s ease;
  }
  .chart-box { position: relative; width: 100%; max-width: 420px; margin: 0 auto; }
  .dept-row {
    padding: 13px 16px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    margin-bottom: 10px;
  }
  .dept-row.best { border-color: var(--accent); background: var(--accent-soft); }
  .dept-row .dept-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 4px;
  }
  .dept-row .dept-name { font-weight: 800; color: var(--navy); font-size: 15px; }
  .dept-row .dept-score { font-weight: 800; font-size: 19px; color: var(--accent); flex-shrink: 0; }
  .dept-row .dept-comment { font-size: 13px; color: var(--text-sub); line-height: 1.6; }
  .best-badge {
    display: inline-block;
    background: var(--accent); color: #fff;
    font-size: 11px; font-weight: 700;
    padding: 2px 10px; border-radius: 999px;
    margin-left: 8px; vertical-align: 2px;
  }
  .profile-section { margin-bottom: 16px; }
  .profile-section h3 { display: flex; align-items: center; gap: 8px; }
  .profile-section ul { margin: 4px 0 0 22px; font-size: 14.5px; }
  .profile-section li { margin-bottom: 3px; }

  /* ===== 特性詳細（表・バッジ・強みチップ） ===== */
  .strength-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 4px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 700;
    padding: 6px 14px; border-radius: 999px;
  }
  .chip-strong { background: var(--accent-soft); color: var(--accent); border: 1px solid #e4c9a8; }
  .chip-grow   { background: #e9f3ee; color: var(--green); border: 1px solid #c4dfd2; }

  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
    min-width: 480px;
  }
  .detail-table th {
    text-align: left;
    font-size: 12px;
    color: var(--text-sub);
    border-bottom: 2px solid var(--line);
    padding: 8px 10px;
    white-space: nowrap;
  }
  .detail-table td {
    padding: 10px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
    line-height: 1.6;
  }
  .detail-table td.score-cell { font-weight: 800; color: var(--navy); white-space: nowrap; }
  .band-badge {
    display: inline-block;
    font-size: 11.5px; font-weight: 700;
    padding: 2px 10px; border-radius: 999px;
    white-space: nowrap;
  }
  .band-strong { background: var(--accent-soft); color: var(--accent); }
  .band-stable { background: #e8eef4; color: var(--navy-light); }
  .band-grow   { background: #e9f3ee; color: var(--green); }

  /* スマホでは表を横スクロールさせず、1行＝1カードの縦積みに切り替える */
  @media (max-width: 560px) {
    .detail-table { min-width: 0; }
    .detail-table thead { display: none; }
    .detail-table tbody tr {
      display: block;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .detail-table td {
      display: block;
      border: none;
      padding: 2px 0;
    }
  }

  .mini-bar-track {
    width: 90px; height: 7px;
    background: var(--line); border-radius: 999px;
    overflow: hidden; display: inline-block;
    vertical-align: 2px; margin-left: 8px;
  }
  .mini-bar-fill { height: 100%; background: linear-gradient(90deg, var(--navy-light), var(--accent)); border-radius: 999px; }

  .disclaimer {
    background: #eef3f7;
    border-left: 5px solid var(--navy);
    border-radius: 8px;
    padding: 16px 18px;
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.8;
  }
  .disclaimer strong { color: var(--navy); display: block; margin-bottom: 4px; }

  .app-footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-sub);
    padding: 16px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ============================================================
   ▼ 調整用定数（スコアの効き方を変えたいときはここ）
   ============================================================ */
const ANSWER_RATIO = 0.75;   // 部署スコアに占める「回答」の比率（残りはタイプ補正）
const SCORE_FLOOR  = 40;     // スコア下限。素点0-100を FLOOR-100 に圧縮して底上げ

/* ============================================================
   ▼ カテゴリ定義（10カテゴリ）
   ============================================================ */
const CATEGORIES = {
  stress:  "ストレス耐性・逆境対応",
  nego:    "対人折衝・交渉力",
  acc:     "正確性・緻密さ",
  team:    "チームワーク・誠実性",
  adapt:   "変化対応・段取り力",
  drive:   "目標達成意欲・行動力",
  create:  "創造性・デザイン感覚",
  empathy: "傾聴・共感力",
  plan:    "企画・分析・発信力",
  learn:   "学習意欲・成長志向",
};

/* カルチャーフィット算出時のカテゴリ重み（合計1.0）
   誠実性=team、現場/顧客対応の耐性=stress、変化対応=adapt、
   若い成長企業ゆえ drive/learn も重視 */
const CULTURE_WEIGHTS = {
  team: 0.15, stress: 0.15, adapt: 0.12, drive: 0.12, learn: 0.12,
  acc: 0.10, nego: 0.10, empathy: 0.07, create: 0.04, plan: 0.03,
};

/* 部署別適性のカテゴリ重み（三条工務店の実際の6部門。各行合計1.0）
   営業部        = 仕入れ(買取)・販売・価格交渉・目標達成
   工務部        = 工程管理・施工業者折衝・工期(=金利負担)厳守
   空間デザイナー = リノベーションプラン作成・商品企画
   財務経理・契約管理 = 金銭処理・契約書チェック・各部署支援
   経営企画・人事・広報 = 会社の仕組みづくり・採用・発信
   （株）雅家    = 事故物件・訳あり物件専門（グループ会社） */
const DEPT_WEIGHTS = {
  eigyo:  { drive: 0.30, nego: 0.25, stress: 0.20, empathy: 0.15, adapt: 0.10 },
  koumu:  { adapt: 0.30, nego: 0.25, stress: 0.25, acc: 0.20 },
  design: { create: 0.40, adapt: 0.15, empathy: 0.15, acc: 0.15, learn: 0.15 },
  keiri:  { acc: 0.45, team: 0.30, plan: 0.15, stress: 0.10 },
  kikaku: { plan: 0.35, team: 0.20, drive: 0.15, create: 0.15, learn: 0.15 },
  miyabi: { empathy: 0.35, stress: 0.25, nego: 0.25, team: 0.15 },
};

const DEPT_INFO = {
  eigyo:  { name: "営業部", short: "営業",
    comment: "物件の仕入れ（買取）と販売が主戦場。仲介業者・売主との交渉と目標達成意欲が問われる最前線。" },
  koumu:  { name: "工務部（商品コーディネーター）", short: "工務",
    comment: "年間1,000件超の物件の工程管理と施工業者との折衝を担い、工期（＝金利負担）を守り抜く現場の司令塔。" },
  design: { name: "空間デザイナー", short: "デザイナー",
    comment: "買い取った中古物件のリノベーションプランを作成し、「売れる空間」を創造するデザイン職。" },
  keiri:  { name: "財務経理・契約管理", short: "経理・契約",
    comment: "買取契約の書類手続き、金銭処理、物件資料の作成で全部署を支えるバックオフィスの要。" },
  kikaku: { name: "経営企画・人事・広報", short: "企画・人事",
    comment: "急成長する組織の制度設計・採用・情報発信を担う「会社をつくる」ポジション。" },
  miyabi: { name: "（株）雅家（特殊物件）", short: "雅家",
    comment: "事故物件・訳あり物件専門のグループ会社。事情を抱えたお客様に寄り添う傾聴力と胆力が要る専門職。" },
};

/* ============================================================
   ▼ 共通の基礎質問 60問（10カテゴリ×6問。逆転項目 rev:true は19問）
   三条工務店の業務文脈（買取再販・工期・施工業者折衝・契約書類・
   事故物件対応など）に沿った具体的な行動を問う。
   ============================================================ */

/* 選択タイプ("ESTJ"等) → 76問の質問リストを返す */
function buildQuestions(type) {
  const extra = type.split("").flatMap(letter => LETTER_QUESTIONS[letter]);
  return [...COMMON_QUESTIONS, ...extra]; // 60 + 16 = 76問
}

   ============================================================ */

/* 素点0-100を SCORE_FLOOR-100 に圧縮（極端な低スコアを出さない） */
function applyFloor(score) {
  return Math.round(SCORE_FLOOR + (score / 100) * (100 - SCORE_FLOOR));
}

/* カテゴリごとの正規化スコア(0-100)を算出。逆転項目は 6-回答値 で反転 */
function calcCategoryScores(questions, answers) {
  const sum = {}, max = {};
  questions.forEach((q, i) => {
    const raw = q.rev ? 6 - answers[i] : answers[i];
    sum[q.cat] = (sum[q.cat] || 0) + (raw - 1); // 1-5 → 0-4 に変換して正規化
    max[q.cat] = (max[q.cat] || 0) + 4;
  });
  const scores = {};
  Object.keys(CATEGORIES).forEach(cat => {
    scores[cat] = max[cat] ? (sum[cat] / max[cat]) * 100 : 50;
  });
  return scores;
}

/* 部署別スコア = 回答(ANSWER_RATIO) + タイプ補正(1-ANSWER_RATIO) → 下限底上げ */
function calcDeptScores(catScores, type) {
  const result = {};
  Object.keys(DEPT_WEIGHTS).forEach(dept => {
    const w = DEPT_WEIGHTS[dept];
    let answerScore = 0;
    Object.keys(w).forEach(cat => { answerScore += catScores[cat] * w[cat]; });
    const mixed = answerScore * ANSWER_RATIO + TYPE_BONUS[type][dept] * (1 - ANSWER_RATIO);
    result[dept] = applyFloor(mixed);
  });
  return result;
}

/* カルチャーフィット度 = カテゴリスコアの重み付き平均 → 下限底上げ */
function calcCultureFit(catScores) {
  let total = 0;
  Object.keys(CULTURE_WEIGHTS).forEach(cat => {
    total += catScores[cat] * CULTURE_WEIGHTS[cat];
  });
  return applyFloor(total);
}

  "ややあてはまる", "非常にあてはまる",
];

function QuizScreen({ questions, answers, setAnswers, onFinish }) {
  const [idx, setIdx] = useState(0);
  const total = questions.length;
  const q = questions[idx];
  const answered = answers.filter(a => a !== null).length;
  const allDone = answered === total;
  const isLast = idx === total - 1;

  /* 自動送りは「現在の質問の次」へ絶対値で移動する。
     素早い連打でタイマーが2重発火しても同じ質問に着地し、質問飛ばしを防ぐ */
  const select = (value) => {
    const next = [...answers];
    next[idx] = value;
    setAnswers(next);
    if (!isLast) setTimeout(() => setIdx(Math.min(idx + 1, total - 1)), 180);
  };

  const firstUnanswered = answers.indexOf(null);

  return (
    <div className="screen">
      <div className="card">
        <div className="progress-wrap">
          <div className="progress-meta">
            <span>質問 {idx + 1} / {total}</span>
            <span>回答済み {answered} / {total}</span>
          </div>
          <div className="progress-track" role="progressbar"
            aria-valuenow={answered} aria-valuemin={0} aria-valuemax={total}>
            <div className="progress-fill" style={{ width: `${(answered / total) * 100}%` }} />
          </div>
        </div>

        <span className="q-category">{CATEGORIES[q.cat]}</span>
        <p className="q-text">Q{idx + 1}. {q.text}</p>

        <div className="likert" role="radiogroup" aria-label="回答を選択">
          {LIKERT_LABELS.map((label, i) => {
            const value = i + 1;
            const sel = answers[idx] === value;
            return (
              <button key={value} role="radio" aria-checked={sel}
                className={"likert-option" + (sel ? " selected" : "")}
                onClick={() => select(value)}>
                <span className="num">{value}</span>
                {label}
              </button>
            );
          })}
        </div>

        <div className="quiz-nav">
          <button className="btn btn-ghost" disabled={idx === 0}
            onClick={() => setIdx(i => i - 1)}>← 前へ</button>
          {isLast ? (
            <button className="btn btn-primary" disabled={!allDone} onClick={onFinish}>
              結果を見る
            </button>
          ) : (
            <button className="btn btn-ghost" disabled={answers[idx] === null}
              onClick={() => setIdx(i => i + 1)}>次へ →</button>
          )}
        </div>

        {/* 未回答が残っていると「結果を見る」が押せないため、該当質問へ誘導する */}
        {isLast && !allDone && (
          <div className="unanswered-note" role="alert">
            未回答の質問が {total - answered} 問あります。すべて回答すると「結果を見る」が押せるようになります。
            <button className="btn btn-primary btn-wide" style={{marginTop: 10}}
              onClick={() => setIdx(firstUnanswered)}>
              未回答の質問（Q{firstUnanswered + 1}）へ移動する
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* --- 結果画面のレーダーチャート（Chart.js） --- */
function DeptRadarChart({ deptScores }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const deptKeys = Object.keys(DEPT_WEIGHTS);
    const chart = new Chart(canvasRef.current, {
      type: "radar",
      data: {
        labels: deptKeys.map(k => DEPT_INFO[k].short),
        datasets: [{
          label: "部署別適性スコア",
          data: deptKeys.map(k => deptScores[k]),
          backgroundColor: "rgba(192, 123, 58, 0.22)",
          borderColor: "#c07b3a",
          borderWidth: 2.5,
          pointBackgroundColor: "#16324f",
          pointRadius: 5,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          r: {
            min: 0, max: 100,
            ticks: { stepSize: 20, backdropColor: "transparent", color: "#5a6b7a" },
            grid: { color: "#dde4ea" },
            angleLines: { color: "#dde4ea" },
            pointLabels: { font: { size: 12, weight: "700" }, color: "#16324f" },
          },
        },
        plugins: { legend: { display: false } },
      },
    });
    return () => chart.destroy();
  }, [deptScores]);
  return (
    <div className="chart-box">
      <canvas ref={canvasRef} aria-label="部署別適性のレーダーチャート" role="img"></canvas>
    </div>
  );
}

/* --- 結果画面のカテゴリ別横棒グラフ（Chart.js） --- */
function CategoryBarChart({ catDisplay }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const keys = Object.keys(CATEGORIES);
    const chart = new Chart(canvasRef.current, {
      type: "bar",
      data: {
        labels: keys.map(k => CATEGORIES[k]),
        datasets: [{
          label: "カテゴリスコア",
          data: keys.map(k => catDisplay[k]),
          backgroundColor: keys.map(k =>
            catDisplay[k] >= 75 ? "rgba(192,123,58,0.85)" :
            catDisplay[k] >= 60 ? "rgba(44,85,120,0.8)" : "rgba(46,125,91,0.75)"),
          borderRadius: 6,
          barThickness: 18,
        }],
      },
      options: {
        indexAxis: "y",
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: { min: 0, max: 100, ticks: { stepSize: 20, color: "#5a6b7a" }, grid: { color: "#dde4ea" } },
          y: { ticks: { font: { size: 12.5, weight: "700" }, color: "#16324f" }, grid: { display: false } },
        },
        plugins: { legend: { display: false } },
      },
    });
    return () => chart.destroy();
  }, [catDisplay]);
  return (
    <div style={{ height: 420 }}>
      <canvas ref={canvasRef} aria-label="カテゴリ別スコアの横棒グラフ" role="img"></canvas>
    </div>
  );
}

/* --- 画面4: 結果 --- */
function ResultScreen({ type, questions, answers, onRestart }) {
  const catScores = calcCategoryScores(questions, answers);
  const deptScores = calcDeptScores(catScores, type);
  const cultureFit = calcCultureFit(catScores);
  const profile = TYPE_PROFILES[type];
  const bestDept = Object.keys(deptScores)
    .reduce((a, b) => (deptScores[b] > deptScores[a] ? b : a));
  const deptOrder = Object.keys(DEPT_WEIGHTS);

  /* カテゴリ別の表示用スコア（部署スコアと同じく下限底上げを適用） */
  const catDisplay = {};
  Object.keys(CATEGORIES).forEach(k => { catDisplay[k] = applyFloor(catScores[k]); });
  /* スコア降順に並べたカテゴリ（表・強みチップ用） */
  const rankedCats = Object.keys(CATEGORIES)
    .sort((a, b) => catDisplay[b] - catDisplay[a]);
  const topCats = rankedCats.slice(0, 2);
  const growCat = rankedCats[rankedCats.length - 1];

  return (
    <div className="screen">
      {/* (a) カルチャーフィット度 */}
      <div className="card">
        <h2>診断結果 — {type}（{profile.label}）</h2>
        <div className="fit-gauge-wrap">
          <p className="sub" style={{fontWeight: 700}}>三条工務店とのカルチャーフィット度</p>
          <div className="fit-score">{cultureFit}<small> %</small></div>
          <div className="gauge-track" role="progressbar"
            aria-valuenow={cultureFit} aria-valuemin={0} aria-valuemax={100}
            aria-label="カルチャーフィット度">
            <div className="gauge-fill" style={{ width: `${cultureFit}%` }} />
          </div>
        </div>
        <p className="sub">{fitComment(cultureFit)}</p>
      </div>

      {/* (b) 部署別適性 */}
      <div className="card">
        <h2>部署別適性</h2>
        <DeptRadarChart deptScores={deptScores} />
        <div style={{marginTop: 18}}>
          {deptOrder.map(dept => (
            <div key={dept} className={"dept-row" + (dept === bestDept ? " best" : "")}>
              <div className="dept-head">
                <span className="dept-name">
                  {DEPT_INFO[dept].name}
                  {dept === bestDept && <span className="best-badge">BEST</span>}
                </span>
                <span className="dept-score">{deptScores[dept]}<small style={{fontSize: 12}}> /100</small></span>
              </div>
              <p className="dept-comment">
                {deptComment(dept, deptScores[dept], dept === bestDept)} {DEPT_INFO[dept].comment}
              </p>
            </div>
          ))}
        </div>
      </div>

      {/* (b-2) カテゴリ別の特性詳細（横棒グラフ＋表） */}
      <div className="card">
        <h2>特性の詳細分析</h2>
        <p className="sub">76問の回答を10のビジネス特性に分解したスコアです。</p>
        <div className="strength-chips" aria-label="強みと伸びしろのサマリー">
          {topCats.map(k => (
            <span key={k} className="chip chip-strong">💪 強み：{CATEGORIES[k]}</span>
          ))}
          <span className="chip chip-grow">🌱 伸びしろ：{CATEGORIES[growCat]}</span>
        </div>
        <CategoryBarChart catDisplay={catDisplay} />
        <div className="table-scroll">
          <table className="detail-table">
            <thead>
              <tr>
                <th scope="col">特性カテゴリ</th>
                <th scope="col">スコア</th>
                <th scope="col">評価</th>
                <th scope="col">ワンポイント</th>
              </tr>
            </thead>
            <tbody>
              {rankedCats.map(k => {
                const band = catBand(catDisplay[k]);
                return (
                  <tr key={k}>
                    <td style={{fontWeight: 700, color: "var(--navy)", whiteSpace: "nowrap"}}>{CATEGORIES[k]}</td>
                    <td className="score-cell">
                      {catDisplay[k]}
                      <span className="mini-bar-track" aria-hidden="true">
                        <span className="mini-bar-fill" style={{width: `${catDisplay[k]}%`, display: "block"}} />
                      </span>
                    </td>
                    <td><span className={"band-badge " + band.cls}>{band.label}</span></td>
                    <td>{CATEGORY_COMMENTS[k][band.key]}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* (b-3) 回答スタイル分析（面接での対話の参考情報） */}
      <div className="card">
        <h2>回答スタイルの傾向</h2>
        <p className="sub">スコアとは別に、回答のしかたそのものから見える傾向です。優劣ではなく、面接での対話のヒントとしてご覧ください。</p>
        <div className="table-scroll" style={{marginTop: 10}}>
          <table className="detail-table">
            <thead>
              <tr>
                <th scope="col">指標</th>
                <th scope="col">値</th>
                <th scope="col">読み取れる傾向</th>
              </tr>
            </thead>
            <tbody>
              {ANSWER_STYLE_METRICS.map(m => {
                const v = m.calc(answers);
                return (
                  <tr key={m.name}>
                    <td style={{fontWeight: 700, color: "var(--navy)", whiteSpace: "nowrap"}}>
                      {m.name}
                      <span style={{display: "block", fontSize: 11, fontWeight: 400, color: "var(--text-sub)"}}>{m.desc}</span>
                    </td>
                    <td className="score-cell">{m.format(v)}</td>
                    <td>{m.judge(v)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* (c) タイプ解説 */}
      <div className="card">
        <h2>{type}（{profile.label}）のビジネス傾向</h2>
        <div className="profile-section">
          <h3>💪 仕事上の強み</h3>
          <ul>{profile.strengths.map(s => <li key={s}>{s}</li>)}</ul>
        </div>
        <div className="profile-section">
          <h3>🌱 さらに伸ばせるポイント</h3>
          <ul>{profile.growth.map(s => <li key={s}>{s}</li>)}</ul>
        </div>
        <div className="profile-section">
          <h3>🤝 チーム内での役割傾向</h3>
          <p style={{fontSize: "14.5px"}}>{profile.role}</p>
        </div>
      </div>

      {/* (d) 免責事項 */}
      <div className="card">
        <div className="disclaimer">
          <strong>ご確認ください（免責事項）</strong>
          {DISCLAIMER_TEXT}
        </div>
      </div>

      {/* (e) 再診断 */}
      <button className="btn btn-ghost btn-wide" onClick={onRestart}>
        もう一度診断する
      </button>
    </div>
  );
}

/* --- ルート: 4画面をuseStateで切り替えるSPA --- */
function App() {
  const [screen, setScreen] = useState("top");   // top | type | quiz | result
  const [mbtiType, setMbtiType] = useState(null);
  const [questions, setQuestions] = useState([]);
  const [answers, setAnswers] = useState([]);

  const startQuiz = (type) => {
    const qs = buildQuestions(type);
    setMbtiType(type);
    setQuestions(qs);
    setAnswers(Array(qs.length).fill(null));
    setScreen("quiz");
  };

  const restart = () => {
    setMbtiType(null);
    setQuestions([]);
    setAnswers([]);
    setScreen("top");
  };

  return (
    <React.Fragment>
      <header className="app-header">
        <div className="brand">SANJO KOMUTEN</div>
        <div className="title">株式会社三条工務店 ビジネス適性診断</div>
      </header>
      <main className="container">
        {screen === "top" && <TopScreen onStart={() => setScreen("type")} />}
        {screen === "type" && <TypeSelectScreen onDecide={startQuiz} />}
        {screen === "quiz" && (
          <QuizScreen questions={questions} answers={answers}
            setAnswers={setAnswers} onFinish={() => setScreen("result")} />
        )}
        {screen === "result" && (
          <ResultScreen type={mbtiType} questions={questions}
            answers={answers} onRestart={restart} />
        )}
      </main>
      <footer className="app-footer">
        © 株式会社三条工務店 — 本診断の回答はどこにも送信・保存されません
      </footer>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
